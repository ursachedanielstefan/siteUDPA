<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Colegiul Național Nicolae Bălcescu Brăila</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Tot CSS-ul de mai sus (același ca în codul anterior) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1a1a2e; line-height: 1.5; overflow-x: hidden; transition: background 0.2s ease, color 0.2s ease; }
        body.high-contrast { background: #000 !important; color: #ff0 !important; }
        body.high-contrast .header, body.high-contrast .main-contact, body.high-contrast .footer { background: #000 !important; border-color: #ff0 !important; }
        body.high-contrast .hero-announcements, body.high-contrast .gallery-section, body.high-contrast .contact-card, body.high-contrast .page-title, body.high-contrast .info-public { background: #0a0a0a !important; border: 1px solid #ff0 !important; color: #ff0 !important; }
        body.high-contrast .announcement-item, body.high-contrast .gallery-item { background: #111 !important; border: 1px solid #ff0 !important; }
        body.high-contrast .announcement-item strong, body.high-contrast .contact-card h3, body.high-contrast .section-title { color: #ff0 !important; }
        body.high-contrast .accessibility-btn, body.high-contrast .accessibility-panel { background: #000 !important; border: 2px solid #ff0 !important; color: #ff0 !important; }
        body.grayscale #page-content { filter: grayscale(100%); }
        body.grayscale .accessibility-btn, body.grayscale .accessibility-panel { filter: grayscale(0%); }
        body.large-text { font-size: 120% !important; }
        body.readable-font { font-family: 'Georgia', serif !important; }
        body.reduced-motion *, body.reduced-motion .animated-bg * { animation: none !important; transition: none !important; }
        body.increased-line-height { line-height: 1.8 !important; }
        body.increased-letter-spacing { letter-spacing: 0.05em !important; }
        body.large-cursor, body.large-cursor * { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><polygon points="4,4 26,4 26,26 16,29 4,26" fill="black" stroke="white" stroke-width="2"/><circle cx="16" cy="15" r="3" fill="white"/></svg>') 16 4, auto !important; }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; background: linear-gradient(135deg, #e0e7ff, #f0f4ff, #e0e7ff); }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: floatOrb 20s infinite ease-in-out; }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.4), transparent); top: -200px; left: -200px; }
        .orb-2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(139,92,246,0.3), transparent); bottom: -250px; right: -250px; animation-duration: 25s; animation-delay: -5s; }
        .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(236,72,153,0.25), transparent); top: 40%; left: 60%; animation-duration: 18s; animation-delay: -10s; }
        .orb-4 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(16,185,129,0.25), transparent); bottom: 20%; left: 10%; animation-duration: 22s; animation-delay: -3s; }
        .orb-5 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(245,158,11,0.2), transparent); top: 15%; right: 15%; animation-duration: 28s; animation-delay: -7s; }
        .orb-6 { width: 450px; height: 450px; background: radial-gradient(circle, rgba(99,102,241,0.3), transparent); top: 60%; left: 40%; animation-duration: 30s; animation-delay: -12s; }
        @keyframes floatOrb { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-40px) scale(1.05); } 66% { transform: translate(-20px,30px) scale(0.95); } }
        .particle { position: absolute; background: rgba(59,130,246,0.2); border-radius: 50%; pointer-events: none; animation: floatParticle 15s infinite; }
        @keyframes floatParticle { 0%,100% { transform: translateY(0) translateX(0); opacity: 0; } 15%,85% { opacity: 0.5; } 100% { transform: translateY(-120px) translateX(50px); opacity: 0; } }
        .wave-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; background: repeating-linear-gradient(transparent, transparent 98px, rgba(59,130,246,0.08) 98px, rgba(59,130,246,0.08) 100px); animation: waveMove 10s linear infinite; }
        @keyframes waveMove { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }
        .twinkle { position: absolute; background: rgba(255,255,255,0.6); border-radius: 50%; animation: twinkle 4s infinite; }
        @keyframes twinkle { 0%,100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1); } }
        .shooting-star { position: absolute; width: 2px; height: 2px; background: white; box-shadow: 0 0 10px white; animation: shootStar 8s linear infinite; }
        @keyframes shootStar { 0% { transform: translateX(0) translateY(0); opacity: 0; } 5% { opacity: 1; } 15% { opacity: 0; } 100% { transform: translateX(-300px) translateY(300px); opacity: 0; } }
        #page-content { transition: filter 0.2s ease; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
        .header { background: linear-gradient(135deg, #0a2463, #1e3a8a); color: white; padding: 32px 0; text-align: center; position: relative; }
        .header::before { content: ''; position: absolute; top: -50%; right: -20%; width: 60%; height: 200%; background: rgba(255,255,255,0.05); transform: rotate(25deg); }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; position: relative; z-index: 2; }
        .logo h1 { font-size: 1.75rem; font-weight: 700; }
        .logo p { font-size: 0.85rem; opacity: 0.85; margin-top: 6px; }
        .update-date { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 40px; font-size: 0.8rem; backdrop-filter: blur(4px); }
        .nav-container { background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; }
        .nav-menu { display: flex; list-style: none; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .nav-menu a { display: block; padding: 16px 18px; color: #1a1a2e; text-decoration: none; font-weight: 500; font-size: 0.9rem; border-radius: 8px; transition: all 0.2s; cursor: pointer; }
        .nav-menu a:hover, .nav-menu li.active a { background: #eef2ff; color: #1e3a8a; }
        .mobile-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 12px; }
        .accessibility-btn { position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; background: linear-gradient(135deg, #0a2463, #1e3a8a); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10000; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: all 0.3s cubic-bezier(0.4,0,0.2,1); border: none; font-size: 1.5rem; animation: btnPulse 2s infinite; }
        @keyframes btnPulse { 0%,100% { transform: scale(1); box-shadow: 0 4px 20px rgba(0,0,0,0.2); } 50% { transform: scale(1.05); box-shadow: 0 4px 30px rgba(59,130,246,0.5); } }
        .accessibility-btn:hover { transform: scale(1.1); animation: none; }
        .accessibility-btn i { transition: transform 0.3s; }
        .accessibility-btn.active i { transform: rotate(90deg); }
        .accessibility-panel { position: fixed; bottom: 100px; right: 30px; width: 380px; max-width: calc(100vw - 60px); background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 10000; transform: translateY(20px) scale(0.95); opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); border: 1px solid rgba(59,130,246,0.2); overflow: hidden; }
        .accessibility-panel.active { transform: translateY(0) scale(1); opacity: 1; visibility: visible; }
        .panel-header { background: linear-gradient(135deg, #0a2463, #1e3a8a); color: white; padding: 20px; text-align: center; }
        .panel-header h3 { font-size: 1.2rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .panel-content { padding: 20px; max-height: 500px; overflow-y: auto; }
        .accessibility-group { margin-bottom: 20px; }
        .group-title { font-size: 0.75rem; text-transform: uppercase; color: #6b7280; margin-bottom: 12px; font-weight: 600; }
        .accessibility-options { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
        .accessibility-option { display: flex; align-items: center; gap: 12px; padding: 12px; background: #f8fafc; border-radius: 12px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .accessibility-option:hover { background: #eef2ff; transform: translateX(2px); }
        .accessibility-option.active { background: #e0e7ff; border-color: #1e3a8a; }
        .accessibility-option i { width: 24px; color: #1e3a8a; }
        .language-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .lang-btn { padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 500; transition: all 0.2s; }
        .lang-btn:hover { background: #eef2ff; transform: translateY(-1px); }
        .lang-btn.active { background: #1e3a8a; color: white; border-color: #1e3a8a; }
        .reset-btn { width: 100%; padding: 12px; background: #f1f5f9; border: none; border-radius: 12px; color: #dc2626; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .reset-btn:hover { background: #fee2e2; }
        .page { display: none; }
        .page.active-page { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hero-announcements, .gallery-section, .page-title, .contact-card, .info-public, .documents-section { background: white; border-radius: 20px; padding: 28px 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        .hero-announcements { max-width: 900px; margin: 32px auto 24px; }
        .section-title { font-size: 1.4rem; font-weight: 600; color: #0a2463; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; gap: 10px; text-align: center; }
        .section-title i { color: #f59e0b; }
        .announcements-list { display: flex; flex-direction: column; gap: 12px; }
        .announcement-item { background: #f8fafc; border-radius: 14px; padding: 16px 20px; transition: all 0.2s; border-left: 4px solid #1e3a8a; text-decoration: none; display: block; text-align: center; }
        .announcement-item:hover { background: #eef2ff; transform: translateX(4px); }
        .announcement-item strong { display: block; font-size: 1rem; color: #1e3a8a; margin-bottom: 6px; }
        .announcement-item span { font-size: 0.85rem; color: #4a5568; }
        .gallery-section { max-width: 1100px; margin: 0 auto 32px; text-align: center; }
        .gallery-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; margin-top: 20px; }
        .gallery-item { background: #f8fafc; border-radius: 16px; overflow: hidden; transition: all 0.3s; cursor: pointer; width: 200px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .gallery-item:hover { transform: translateY(-6px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); }
        .gallery-img { width: 100%; height: 180px; object-fit: cover; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; color: white; font-weight: 500; text-align: center; padding: 20px; transition: transform 0.3s; }
        .gallery-item:hover .gallery-img { transform: scale(1.03); }
        .gallery-caption { padding: 12px; text-align: center; font-size: 0.8rem; font-weight: 500; background: white; border-top: 1px solid #edf2f7; }
        .btn-more { display: inline-block; margin-top: 24px; color: #1e3a8a; font-weight: 500; font-size: 0.85rem; text-decoration: none; }
        .btn-more i { transition: transform 0.2s; }
        .btn-more:hover i { transform: translateX(4px); }
        .documents-section { margin: 0 auto 32px; max-width: 1000px; }
        .documents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; margin-top: 20px; }
        .document-card { background: #f8fafc; border-radius: 14px; padding: 16px; text-align: center; transition: all 0.2s; border-left: 4px solid #f59e0b; text-decoration: none; display: block; }
        .document-card:hover { background: #eef2ff; transform: translateX(4px); }
        .document-card i { font-size: 2rem; color: #dc2626; margin-bottom: 10px; display: block; }
        .document-card strong { display: block; font-size: 0.9rem; color: #1e3a8a; }
        .page-title { max-width: 900px; margin: 32px auto 24px; text-align: center; }
        .page-title h1 { font-size: 2rem; color: #0a2463; margin-bottom: 8px; }
        .main-contact { background: linear-gradient(135deg, #0a2463, #1e3a8a); color: white; border-radius: 20px; padding: 32px; margin: 0 auto 32px; max-width: 1000px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .main-contact h2 { font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .main-contact-details { display: flex; justify-content: center; flex-wrap: wrap; gap: 32px; }
        .main-contact-item { display: flex; align-items: center; gap: 15px; text-align: left; }
        .main-contact-item i { font-size: 1.5rem; opacity: 0.9; }
        .main-contact-item .value a { color: white !important; text-decoration: none; }
        .contact-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; margin: 0 auto 32px; max-width: 1000px; }
        .contact-card { flex: 1; min-width: 280px; text-align: center; }
        .contact-card h3 { font-size: 1.3rem; color: #1e3a8a; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; border-bottom: 2px solid #eef2ff; padding-bottom: 12px; }
        .contact-card h3 i { color: #f59e0b; }
        .schedule-table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: center; }
        .schedule-table td { padding: 10px 8px; border-bottom: 1px solid #edf2f7; }
        .info-public { background: #fef3c7; border-left: 4px solid #f59e0b; max-width: 1000px; margin: 0 auto 32px; text-align: center; }
        .footer { background: #0f172a; color: #cbd5e1; padding: 48px 0 24px; margin-top: 48px; text-align: center; }
        .footer-inner { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 32px; margin-bottom: 32px; text-align: left; }
        .footer-links { display: flex; gap: 40px; flex-wrap: wrap; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; cursor: pointer; }
        .footer-links a:hover { color: white; }
        .copyright { text-align: center; padding-top: 24px; border-top: 1px solid #1e293b; font-size: 0.75rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center; cursor: pointer; }
        .modal.active { display: flex; }
        .modal-img { max-width: 90%; max-height: 85%; border-radius: 8px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; padding: 40px; text-align: center; }
        .modal-caption { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: white; background: rgba(0,0,0,0.6); padding: 12px; }
        .modal-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 2rem; cursor: pointer; }
        @media (max-width: 768px) {
            .container { padding: 0 16px; }
            .header-inner { flex-direction: column; text-align: center; }
            .mobile-toggle { display: block; margin: 0 auto; }
            .nav-menu { display: none; width: 100%; flex-direction: column; background: white; padding: 16px 0; }
            .nav-menu.active { display: flex; }
            .gallery-item { width: 160px; }
            .gallery-img { height: 140px; }
            .accessibility-panel { width: 340px; right: 16px; bottom: 90px; }
            .accessibility-options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="animated-bg">
    <div class="bg-orb orb-1"></div><div class="bg-orb orb-2"></div><div class="bg-orb orb-3"></div>
    <div class="bg-orb orb-4"></div><div class="bg-orb orb-5"></div><div class="bg-orb orb-6"></div>
    <div class="wave-line"></div>
</div>

<button class="accessibility-btn" id="accessibilityBtn"><i class="fas fa-universal-access"></i></button>

<div class="accessibility-panel" id="accessibilityPanel">
    <div class="panel-header">
        <h3><i class="fas fa-universal-access"></i> <span data-key="accessibility_title">Accesibilitate</span></h3>
        <p data-key="accessibility_subtitle">Personalizați experiența de vizualizare</p>
    </div>
    <div class="panel-content">
        <div class="accessibility-group">
            <div class="group-title"><i class="fas fa-language"></i> <span data-key="language_title">Limbă</span></div>
            <div class="language-selector" id="languageSelector">
                <button class="lang-btn active" data-lang="ro">🇷🇴 Română</button>
                <button class="lang-btn" data-lang="en">🇬🇧 English</button>
                <button class="lang-btn" data-lang="de">🇩🇪 Deutsch</button>
                <button class="lang-btn" data-lang="fr">🇫🇷 Français</button>
                <button class="lang-btn" data-lang="it">🇮🇹 Italiano</button>
                <button class="lang-btn" data-lang="es">🇪🇸 Español</button>
                <button class="lang-btn" data-lang="tr">🇹🇷 Türkçe</button>
                <button class="lang-btn" data-lang="ar">🇸🇦 العربية</button>
            </div>
        </div>
        <div class="accessibility-group">
            <div class="group-title"><i class="fas fa-eye"></i> <span data-key="view_title">Vizualizare</span></div>
            <div class="accessibility-options">
                <div class="accessibility-option" data-action="high-contrast"><i class="fas fa-adjust"></i><span class="option-text" data-key="high_contrast">Contrast ridicat</span></div>
                <div class="accessibility-option" data-action="grayscale"><i class="fas fa-palette"></i><span class="option-text" data-key="grayscale">Tonuri gri</span></div>
                <div class="accessibility-option" data-action="large-text"><i class="fas fa-text-height"></i><span class="option-text" data-key="large_text">Text mărit</span></div>
                <div class="accessibility-option" data-action="readable-font"><i class="fas fa-font"></i><span class="option-text" data-key="readable_font">Font lizibil</span></div>
            </div>
        </div>
        <div class="accessibility-group">
            <div class="group-title"><i class="fas fa-align-left"></i> <span data-key="reading_title">Citire</span></div>
            <div class="accessibility-options">
                <div class="accessibility-option" data-action="increased-line-height"><i class="fas fa-arrows-alt-v"></i><span class="option-text" data-key="line_height">Spațiere rânduri</span></div>
                <div class="accessibility-option" data-action="increased-letter-spacing"><i class="fas fa-arrows-alt-h"></i><span class="option-text" data-key="letter_spacing">Spațiere litere</span></div>
                <div class="accessibility-option" data-action="large-cursor"><i class="fas fa-mouse-pointer"></i><span class="option-text" data-key="large_cursor">Cursor mare</span></div>
                <div class="accessibility-option" data-action="reduced-motion"><i class="fas fa-film"></i><span class="option-text" data-key="reduced_motion">Mișcare redusă</span></div>
            </div>
        </div>
        <div class="accessibility-group">
            <div class="group-title"><i class="fas fa-undo-alt"></i> <span data-key="reset_title">Resetare</span></div>
            <button class="reset-btn" id="resetAccessibility"><i class="fas fa-undo-alt"></i> <span data-key="reset_button">Resetează toate setările</span></button>
        </div>
    </div>
</div>

<div id="page-content">
    <header class="header">
        <
